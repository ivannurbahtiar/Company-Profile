<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order - Toko Aruna</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <header>
    <div class="logo-container">
      <img src="{{ url_for('static', filename='images/aruna.png') }}" class="logo" alt="Logo Toko Aruna">
      <span class="logo-text">Toko Aruna Blitar</span>
    </div>
    <nav>
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('product') }}">Product</a>
      <a href="{{ url_for('order') }}" class="active">Order</a>
      <a href="{{ url_for('about') }}">About us</a>
      <a href="{{ url_for('developer') }}">Developer</a>
      <a href="{{ url_for('cart') }}" class="cart-icon">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cart-count" class="cart-badge"></span>
      </a>
    </nav>
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </header>

  <main class="order">
    <h2>Form Order</h2>
    <p>Isi data berikut untuk memesan produk.</p>

    <form id="orderForm" action="{{ url_for('submit_order') }}" method="POST">
      <label>Nama Pembeli :</label>
      <input type="text" name="nama" required>

      <label>Pilih Kategori :</label>
      <select name="kategori" id="kategori" required>
        <option value="">-- Pilih Kategori --</option>
        <option value="atk">ATK</option>
        <option value="aksesoris">Aksesoris</option>
        <option value="perlengkapan">Perlengkapan Makan</option>
        <option value="makeup">Make Up</option>
        <option value="skincare">Skincare</option>
      </select>

      <label>Pilih Produk :</label>
      <select name="produk" id="produk" required disabled>
        <option value="">-- Pilih Produk --</option>
      </select>

      <label>Jumlah :</label>
      <input type="number" name="jumlah" required>

      <label>No. WhatsApp / Email :</label>
      <input type="text" name="kontak" required>

      <button type="submit">Kirim Pesanan</button>
    </form>
  </main>

  <footer class="footer">
    <div class="footer-contact">
      <a href="https://maps.app.goo.gl/qDjy7xkhr2C5efDHA" target="_blank" class="footer-item">
        <i class="fa-solid fa-location-dot"></i>
        <span>Jl. Raya Kawi, Mandingasem, Gandusari, Kec. Gandusari, Kabupaten Blitar, Jawa Timur</span>
      </a>
      <a href="https://wa.me/6285707938522" target="_blank" class="footer-item">
        <i class="fa-solid fa-phone"></i>
        <span>0857-0793-8522</span>
      </a>
      <a href="mailto:tokoarunaatk@gmail.com" class="footer-item">
        <i class="fa-solid fa-envelope"></i>
        <span>tokoarunaatk@gmail.com</span>
      </a>
    </div>
  </footer>

  <!-- allProducts harus di atas script.js! -->
  <script>
    var allProducts = [
      {% for p in products %}
      { nama: "{{ p.nama }}", kategori: "{{ p.kategori }}" },
      {% endfor %}
    ];
  </script>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>

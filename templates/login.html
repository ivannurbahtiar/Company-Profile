<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Toko Aruna</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="{{ url_for('static', filename='images/aruna.png') }}" class="logo" alt="Logo Toko Aruna">
      <span class="logo-text">Toko Aruna Blitar</span>
    </div>
    <nav>
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('product') }}">Product</a>
      <a href="{{ url_for('order') }}">Order</a>
      <a href="{{ url_for('about') }}">About us</a>
      <a href="{{ url_for('developer') }}">Developer</a>
      <a href="{{ url_for('login') }}" class="active">Login</a>
    </nav>
    <div class="hamburger">
      <span></span><span></span><span></span>
    </div>
  </header>

  <main class="order">
    <h2>Akun Saya</h2>

    <!-- Tab Login / Daftar -->
    <div class="login-tabs">
      <button class="tab-btn active" onclick="showTab('login')">Login</button>
      <button class="tab-btn" onclick="showTab('register')">Daftar</button>
    </div>

    {% if error %}
    <p style="color:#ffea70; text-align:center;">{{ error }}</p>
    {% endif %}

    <!-- Form Login -->
    <form id="loginForm" action="{{ url_for('login') }}" method="POST">
      <label>Username :</label>
      <input type="text" name="username" required>
      <label>Password :</label>
      <input type="password" name="password" required>
      <button type="submit">Login</button>
    </form>

    <!-- Form Daftar -->
    <form id="registerForm" action="{{ url_for('register') }}" method="POST" style="display:none;">
      <label>Username :</label>
      <input type="text" name="username" required>
      <label>Password :</label>
      <input type="password" name="password" required>
      <button type="submit">Daftar</button>
    </form>
  </main>

  <footer class="footer">
    <div class="footer-contact">
      <a href="https://maps.app.goo.gl/qDjy7xkhr2C5efDHA" target="_blank" class="footer-item">
        <i class="fa-solid fa-location-dot"></i>
        <span>Jl. Raya Kawi, Mandingasem, Gandusari, Kabupaten Blitar, Jawa Timur</span>
      </a>
      <a href="https://wa.me/6285707938522" target="_blank" class="footer-item">
        <i class="fa-solid fa-phone"></i>
        <span>0857-0793-8522</span>
      </a>
      <a href="mailto:tokoarunaatk@gmail.com" class="footer-item">
        <i class="fa-solid fa-envelope"></i>
        <span>tokoarunaatk@gmail.com</span>
      </a>
    </div>
  </footer>

  <script>
    function showTab(tab) {
      document.getElementById('loginForm').style.display    = tab === 'login'    ? 'flex' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'flex' : 'none';
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
    }

    // Kalau ada error register, otomatis buka tab daftar
    {% if tab == 'register' %}
    showTab('register');
    {% endif %}
  </script>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>

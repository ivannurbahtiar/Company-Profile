<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keranjang - Toko Aruna</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <header>
    <div class="logo-container">
      <img src="{{ url_for('static', filename='images/aruna.png') }}" class="logo" alt="Logo Toko Aruna">

    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>

      <a href="https://wa.me/6285707938522" target="_blank" class="footer-item">

        <span>0857-0793-8522</span>
      </a>
      <a href="mailto:tokoarunaatk@gmail.com" class="footer-item">
        <i class="fa-solid fa-envelope"></i>
        <span>tokoarunaatk@gmail.com</span>

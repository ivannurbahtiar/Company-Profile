<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - Toko Aruna</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <header>
    <div class="logo-container">
      <img src="{{ url_for('static', filename='images/aruna.png') }}" class="logo" alt="Logo Toko Aruna">
      <span class="logo-text">Toko Aruna Blitar</span>
    </div>
    <nav>
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('product') }}" class="active">Product</a>
      <a href="{{ url_for('order') }}">Order</a>
      <a href="{{ url_for('about') }}">About us</a>
      <a href="{{ url_for('developer') }}">Developer</a>
      <a href="{{ url_for('cart') }}" class="cart-icon">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cart-count" class="cart-badge"></span>
      </a>
    </nav>
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </header>

  <main>
    <div class="product-nav">
      <button class="prod-btn active" data-category="atk">ATK</button>
      <button class="prod-btn" data-category="aksesoris">Aksesoris</button>
      <button class="prod-btn" data-category="perlengkapan">Perlengkapan makan</button>
      <button class="prod-btn" data-category="makeup">Make Up</button>
      <button class="prod-btn" data-category="skincare">Skincare</button>
    </div>

    <!-- Produk dirender dari database via Jinja2 -->
    <div id="product-container">
      {% for p in products %}
      <div class="product-card" data-category="{{ p.kategori }}">
        <img src="{{ url_for('static', filename='images/' + p.gambar) }}" 
             alt="{{ p.nama }}" class="product-img">
        <h3>{{ p.nama }}</h3>
        <p>Rp {{ '{:,.0f}'.format(p.harga) }}</p>
        <a href="{{ url_for('order') }}" class="btn-order">Order</a>
      </div>
      {% endfor %}
    </div>
  </main>

  <div id="imgModal" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="modalImage">
  </div>

  <footer class="footer">
    <div class="footer-contact">
      <a href="https://maps.app.goo.gl/qDjy7xkhr2C5efDHA" target="_blank" class="footer-item">
        <i class="fa-solid fa-location-dot"></i>
        <span>Jl. Raya Kawi, Mandingasem, Gandusari, Kec. Gandusari, Kabupaten Blitar, Jawa Timur</span>
      </a>
      <a href="https://wa.me/6285707938522" target="_blank" class="footer-item">
        <i class="fa-solid fa-phone"></i>
        <span>0857-0793-8522</span>
      </a>
      <a href="mailto:tokoarunaatk@gmail.com" class="footer-item">
        <i class="fa-solid fa-envelope"></i>
        <span>tokoarunaatk@gmail.com</span>
      </a>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
